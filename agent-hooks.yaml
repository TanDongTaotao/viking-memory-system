hooks:
- on_session_end:
  - enabled: false
    name: Viking 记忆保存
    script: /home/xlous/.openclaw/scripts/sv_save.sh
    timeout: 30
  on_session_start:
  - background: false
    enabled: true
    env:
      AGENT_NAME: maozhuli
      SV_WORKSPACE: /home/xlous/.openclaw/viking-maozhuli
      VIKING_ENABLE_WATCHER: 'true'
    name: Viking 记忆加载 + 实时监听
    script: /home/xlous/.openclaw/scripts/sv_autoload.sh
    timeout: 60
  when:
    agent: maozhuli
