  on_session_start:
  - background: false
    enabled: true
    env:
      AGENT_NAME: {agent}
      SV_WORKSPACE: $HOME/.openclaw/viking-{agent}
      VIKING_ENABLE_WATCHER: 'true'
    name: Viking 记忆加载 + 实时监听
    script: $HOME/.openclaw/scripts/sv_autoload.sh
    timeout: 60
  - background: true
    enabled: true
    env:
      EMBED_MODEL: nomic-embed-text:latest
      OLLAMA_HOST: http://192.168.5.110:11434
    name: Viking 向量库自动构建
    script: $HOME/.openclaw/scripts/viking-embed.sh
    timeout: 300
  when:
    agent: {agent}
- on_session_start:
  - background: true
    enabled: true
    env:
      SV_WORKSPACE: $HOME/.openclaw/viking-global
      VIKING_ENABLE_WATCHER: 'true'
      WATCH_DIR_OVERRIDE: $HOME/.openclaw/viking-global
    name: Viking-Global 实时监听
    script: $HOME/.openclaw/scripts/sv_memory_watcher.sh
    timeout: 10
  - background: true
    enabled: true
    env:
      EMBED_MODEL: nomic-embed-text:latest
      OLLAMA_HOST: http://192.168.5.110:11434
    name: Viking 向量库自动构建
    script: $HOME/.openclaw/scripts/viking-embed.sh
    timeout: 300
  when:
    agent: {agent}
